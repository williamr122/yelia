<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" class="yelia-avatar-svg" role="img" aria-label="YELIA avatar owl">
  <defs>
    <linearGradient id="bgOwl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0FFFB"/>
      <stop offset="1" stop-color="#E2FFF6"/>
    </linearGradient>
    <radialGradient id="owlHead" cx="45%" cy="28%" r="85%">
      <stop offset="0" stop-color="#E9CFAD"/>
      <stop offset="1" stop-color="#D6B088"/>
    </radialGradient>
    <radialGradient id="owlRing" cx="45%" cy="30%" r="85%">
      <stop offset="0" stop-color="#FFF8EF" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#F2E6D7" stop-opacity="0.95"/>
    </radialGradient>
    <radialGradient id="owlBeak" cx="45%" cy="30%" r="80%">
      <stop offset="0" stop-color="#FFE07A"/>
      <stop offset="1" stop-color="#F2B63C"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <clipPath id="yelia-face-clip">
      <circle cx="100" cy="110" r="64"/>
    </clipPath>
  </defs>

  <style>
    :root { --stroke:#1B2430; }
    .s{ stroke:var(--stroke); stroke-width:6; stroke-linecap:round; stroke-linejoin:round; vector-effect:non-scaling-stroke; }
    .shadow{ fill:rgba(0,0,0,.16); }
    .cheek{ fill:#FFB3C1; opacity:.30; }
    .eyeW{ fill:#FFFFFF; }
    .pupil{ fill:#1B2430; }
    .hl{ fill:#FFFFFF; opacity:.85; }
    .mouthLine{ fill:none; }
    .mouthOpen{ fill:#1B2430; opacity:0; }
    .feather{ fill:#C7A47B; opacity:.18; }
  </style>

  <rect x="10" y="10" width="180" height="180" rx="24" fill="url(#bgOwl)"/>
  <ellipse class="shadow" cx="100" cy="168" rx="52" ry="14"/>

  <g id="yelia-root" filter="url(#softShadow)">
    <!-- little tufts -->
    <path class="s" fill="url(#owlHead)" d="M62 54 C58 40 66 28 80 30 C74 40 74 50 78 56 Z"/>
    <path class="s" fill="url(#owlHead)" d="M138 54 C142 40 134 28 120 30 C126 40 126 50 122 56 Z"/>

    <!-- head -->
    <circle cx="100" cy="110" r="70" class="s" fill="url(#owlHead)"/>

    <g clip-path="url(#yelia-face-clip)">
      <!-- ring -->
      <path fill="url(#owlRing)" d="M55 110 C55 78 74 56 100 56 C126 56 145 78 145 110 C145 142 126 164 100 164 C74 164 55 142 55 110 Z"/>

      <!-- subtle feather texture -->
      <path class="feather" d="M70 150 C80 140 92 142 100 150 C108 158 120 160 130 150"/>
      <path class="feather" d="M68 132 C80 122 92 124 100 132 C108 140 120 142 132 132"/>

      <!-- cheeks -->
      <circle id="yelia-cheek-left" cx="76" cy="140" r="11" class="cheek"/>
      <circle id="yelia-cheek-right" cx="124" cy="140" r="11" class="cheek"/>

      <!-- brows -->
      <path id="yelia-brow-left" class="s" fill="none" d="M62 86 C74 76 90 76 98 84"/>
      <path id="yelia-brow-right" class="s" fill="none" d="M102 84 C110 76 126 76 138 86"/>

      <!-- eyes -->
      <g id="yelia-eye-left">
        <circle cx="80" cy="110" r="22" class="s eyeW"/>
        <circle cx="80" cy="110" r="14" fill="#EAF2FF"/>
        <circle id="yelia-pupil-left" cx="80" cy="110" r="7" class="pupil"/>
        <circle class="hl" cx="77" cy="107" r="3.2"/>
      </g>
      <g id="yelia-eye-right">
        <circle cx="120" cy="110" r="22" class="s eyeW"/>
        <circle cx="120" cy="110" r="14" fill="#EAF2FF"/>
        <circle id="yelia-pupil-right" cx="120" cy="110" r="7" class="pupil"/>
        <circle class="hl" cx="117" cy="107" r="3.2"/>
      </g>

      <!-- beak -->
      <path class="s" fill="url(#owlBeak)" d="M100 124 L90 142 L110 142 Z"/>

      <!-- mouth -->
      <g id="yelia-mouth">
        <path id="yelia-mouth-line" class="s mouthLine yelia-mouth-anim" d="M90 146 C96 152 104 152 110 146"/>
        <path id="yelia-mouth-open" class="mouthOpen yelia-mouth-anim" d="M90 150 C94 166 106 166 110 150 C106 156 94 156 90 150Z"/>
      </g>
    </g>
  </g>
</svg>
